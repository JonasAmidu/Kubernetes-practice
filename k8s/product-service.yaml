apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: microservices-app
  labels:
    app: product-service
    app.kubernetes.io/name: product-service
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
        app.kubernetes.io/name: product-service
        app.kubernetes.io/component: backend
    spec:
      containers:
      - name: product-service
        image: microservices-app/product-service:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3002
          name: http
        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: PRODUCT_SERVICE_PORT
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: NODE_ENV
        livenessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 3
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        securityContext:
          runAsNonRoot: true
          runAsUser: 1001
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: microservices-app
  labels:
    app: product-service
    app.kubernetes.io/name: product-service
    app.kubernetes.io/component: backend
spec:
  selector:
    app: product-service
  ports:
    - port: 3002
      targetPort: 3002
      name: http
  type: ClusterIP
